name: Validate case files

on:
  push:
    paths:
      - "cases/**"
      - "CHECKLIST.md"
      - "scripts/**"
  pull_request:
    paths:
      - "cases/**"
      - "CHECKLIST.md"
      - "scripts/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python3 scripts/validate_cases.py
      - name: Check dist/learn-from-failure-bundle.md is up to date
        run: |
          python3 scripts/build_bundle.py
          git diff --exit-code -- dist/learn-from-failure-bundle.md || \
            (echo "::error::dist/learn-from-failure-bundle.md is stale — run 'python3 scripts/build_bundle.py' and commit the result." && exit 1)
